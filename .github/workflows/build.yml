name: fmekran Android APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Gradle indir ve kur
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: APK Build et
        run: gradle assembleDebug --no-daemon --stacktrace --no-build-cache --no-configuration-cache

      - name: APK'yı yükle
        uses: actions/upload-artifact@v4
        with:
          name: fmekran-player-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
